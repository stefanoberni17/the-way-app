<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Way">
  <!-- Sfondo: slate-900 con sottile gradient -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="goldenAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background con angoli arrotondati per Android maskable -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Cerchio luminoso dietro la croce (alone) -->
  <circle cx="256" cy="248" r="120" fill="#1e3a8a" opacity="0.35"/>

  <!-- Croce stilizzata in oro/amber -->
  <g fill="url(#goldenAccent)">
    <!-- Asta verticale -->
    <rect x="240" y="140" width="32" height="220" rx="6"/>
    <!-- Braccio orizzontale -->
    <rect x="184" y="208" width="144" height="32" rx="6"/>
  </g>

  <!-- Punto luce in alto della croce -->
  <circle cx="256" cy="148" r="8" fill="#fef3c7" opacity="0.85"/>

  <!-- Linea/sentiero curvo che evoca "la via" -->
  <path d="M 96 420 Q 256 380 416 420" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
